<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Reproductor Universal - Prime Video Style</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f0f1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            padding: 20px;
        }
        .catalogo {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            margin-bottom: 20px;
            font-size: 2rem;
            border-left: 4px solid #00a8ff;
            padding-left: 15px;
        }
        .series-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }
        .card {
            background: #1e1e2a;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
        .card img {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
        }
        .card-info {
            padding: 12px;
        }
        .card-info h3 {
            font-size: 1.1rem;
            margin-bottom: 5px;
        }
        .card-info p {
            font-size: 0.8rem;
            color: #aaa;
        }
        .boton-play {
            display: inline-block;
            background: #00a8ff;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            margin-top: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .boton-play:hover {
            background: #0088cc;
        }
        hr {
            margin: 40px 0 20px;
            border-color: #333;
        }
    </style>
</head>
<body>
    <div class="catalogo">
        <h1>🎬 Contenido Destacado</h1>
        <div class="series-grid" id="catalogo-grid"></div>
        <hr>
        <h2>📺 Episodios sueltos</h2>
        <div class="series-grid" id="singles-grid"></div>
    </div>

    <script src="memoria.js"></script>
    <script src="player.js"></script>
    <script>
        // Datos de ejemplo (usando los mismos enlaces de archive.org)
        const serieJesucristo = {
            seriesId: "jesucristo",
            titulo_serie: "La vida de Jesucristo",
            descripcion_serie: "Serie épica sobre la vida y enseñanzas de Jesús.",
            portada_serie: "https://nikichitonjesus1.odoo.com/web/image/465-4e045826/Min-jesus.webp",
            episodios: [
                {
                    id: "ep1",
                    date: "2025-11-20",
                    mediaUrl: "https://archive.org/download/la-vida-de-jesus-en-ixil-trailer/la%20vida%20de%20Jes%C3%BAs.mp4",
                    thumbnail: "https://nikichitonjesus1.odoo.com/web/image/465-4e045826/Min-jesus.webp",
                    title: "El Nacimiento",
                    description: "El anuncio a María y el nacimiento en Belén.",
                    skipIntro: { start: "00:00", end: "00:08" },
                    skipRecap: { start: "00:45", end: "01:15" },
                    skipCredits: { start: "01:50", end: "02:00" }
                },
                {
                    id: "ep2",
                    date: "2025-11-21",
                    mediaUrl: "https://archive.org/download/la-vida-de-jesus-en-espanol-trailer/la%20vida%20de%20Jes%C3%BAs.mp4",
                    thumbnail: "https://video.nikichitonjesus.org/web/image/438-44d31586/6.webp",
                    title: "El Ministerio",
                    description: "Jesús comienza sus milagros y enseñanzas.",
                    skipIntro: { start: "00:00", end: "00:10" },
                    skipRecap: { start: "01:00", end: "01:30" },
                    skipCredits: { start: "02:00", end: "02:10" }
                },
                {
                    id: "ep3",
                    date: "2025-11-22",
                    mediaUrl: "https://archive.org/download/la-vida-de-jesus-en-espanol-trailer/la%20vida%20de%20Jes%C3%BAs.mp4",
                    thumbnail: "https://nikichitonjesus1.odoo.com/web/image/465-4e045826/Min-jesus.webp",
                    title: "La Pasión",
                    description: "La crucifixión y resurrección.",
                    skipIntro: { start: "00:00", end: "00:07" },
                    skipCredits: { start: "02:15", end: "02:25" }
                }
            ]
        };

        const peliculaSuelta = {
            id: "amor-dios",
            mediaUrl: "https://archive.org/download/la-vida-de-jesus-en-espanol-trailer/la%20vida%20de%20Jes%C3%BAs.mp4",
            thumbnail: "https://nikichitonjesus1.odoo.com/web/image/465-4e045826/Min-jesus.webp",
            title: "El Amor de Dios (Película)",
            description: "Una historia conmovedora sobre la fe.",
            date: "2025-11-15"
        };

        function cargarCatalogo() {
            const grid = document.getElementById('catalogo-grid');
            const cardSerie = document.createElement('div');
            cardSerie.className = 'card';
            cardSerie.innerHTML = `
                <img src="${serieJesucristo.portada_serie}" alt="Serie">
                <div class="card-info">
                    <h3>${serieJesucristo.titulo_serie}</h3>
                    <p>${serieJesucristo.descripcion_serie}</p>
                    <button class="boton-play" data-serie="jesucristo">▶ Ver serie</button>
                </div>
            `;
            cardSerie.querySelector('button').addEventListener('click', () => {
                window.playSerie(serieJesucristo.seriesId, serieJesucristo.episodios);
            });
            grid.appendChild(cardSerie);
        }

        function cargarSingles() {
            const grid = document.getElementById('singles-grid');
            const cardSingle = document.createElement('div');
            cardSingle.className = 'card';
            cardSingle.innerHTML = `
                <img src="${peliculaSuelta.thumbnail}" alt="Película">
                <div class="card-info">
                    <h3>${peliculaSuelta.title}</h3>
                    <p>${peliculaSuelta.description}</p>
                    <button class="boton-play" data-single="amor-dios">▶ Reproducir</button>
                </div>
            `;
            cardSingle.querySelector('button').addEventListener('click', () => {
                window.playSingle(peliculaSuelta);
            });
            grid.appendChild(cardSingle);
        }

        cargarCatalogo();
        cargarSingles();
    </script>
</body>
</html>
